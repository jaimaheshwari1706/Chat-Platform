version: '3.8'

services:
  backend:
    build: ./Chat-Platform-Backend
    container_name: connectly-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your-production-secret-key-change-this
      - PORT=8080
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    container_name: connectly-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  uploads:
    driver: local

networks:
  default:
    name: connectly-network