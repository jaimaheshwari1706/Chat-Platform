version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: chat-platform-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8080

  backend:
    build:
      context: ../Chat-Platform-Backend
      dockerfile: Dockerfile
    image: chat-platform-backend:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chatdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=changeme
      - JWT_REFRESH_SECRET=changeme2
    volumes:
      - backend_uploads:/app/uploads

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
  backend_uploads:
